      - Buffer volume: 100 mL.
      - EtBr at 0.5 µg/mL.
      - Correct preparation order: dissolve agarose in buffer → cool → add stain.

  - id: stella_glycerol_stock_prep
    name: "Bacterial Glycerol Stock Prep"
    category: wet_lab
    tags: [stella, wet_lab, glycerol_stock, formula]
    description: >
