  # ── GENOMICS / SEQUENCING ────────────────────────────────────────────────────

  - id: stella_bwa_mem_alignment
    name: "BWA-MEM Read Alignment"
    category: genomics
    tags: [stella, genomics, alignment, bwa, sequencing]
    description: >
      Align paired-end Illumina reads to GRCh38 reference using BWA-MEM with
      4 threads and proper read group tags.
    prompt: >
      Align paired-end Illumina short reads (sample_R1.fastq.gz, sample_R2.fastq.gz)
      to the GRCh38 reference genome (ref/GRCh38.fa) using BWA-MEM. Use 4 threads,
      mark secondary alignments, add read group tags (ID:sample, SM:sample,
      PL:ILLUMINA), and produce a BAM output.
    expected_output_contains:
      - bwa mem
      - GRCh38
      - -t 4
      - read group
    reference_output: |
      command: >
        bwa mem -t 4 -M -R "@RG\tID:sample\tSM:sample\tPL:ILLUMINA"
        ref/GRCh38.fa reads/sample_R1.fastq.gz reads/sample_R2.fastq.gz
        | samtools sort -o aligned.bam
      output: aligned.bam
    evaluation_criteria: |
      - BWA-MEM command includes -t 4 for 4 threads.
      - Read group tag (@RG) includes ID, SM, and PL fields.
      - Output is a BAM file.
      - Mapping rate >90% expected.

  - id: stella_macs2_peak_calling
    name: "MACS2 ChIP-seq Peak Calling"
    category: genomics
    tags: [stella, genomics, chipseq, macs2, epigenomics]
    description: >
      Call peaks from H1hESC Nanog ChIP-seq data using MACS2 with input control.
    prompt: >
      Call ChIP-seq peaks from H1hESC Nanog data using MACS2. Treatment BAM:
      H1hesc_Nanog_Rep1_aln.bam; Control BAM: H1hesc_Input_Rep1_aln.bam.
      Use human genome size (hs) and output prefix "nanog_peaks". Provide the
      complete MACS2 command.
    expected_output_contains:
      - macs2 callpeak
      - nanog_peaks
      - hs
      - narrowPeak
    reference_output: |
      command: >
        macs2 callpeak -t H1hesc_Nanog_Rep1_aln.bam
        -c H1hesc_Input_Rep1_aln.bam -f BAM -g hs -n nanog_peaks
      output_files:
        - nanog_peaks_peaks.narrowPeak
        - nanog_peaks_summits.bed
        - nanog_peaks_model.r
    evaluation_criteria: |
      - MACS2 callpeak command with -t (treatment) and -c (control).
      - Genome size set to hs.
      - Output name prefix is nanog_peaks.
      - Expected output files listed (narrowPeak, summits.bed).

  - id: stella_chipqc_quality
    name: "ChIPQC Quality Assessment"
    category: genomics
    tags: [stella, genomics, chipseq, qc, epigenomics]
    description: >
