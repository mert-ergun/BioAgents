    evaluation_criteria: |
      - ChIPQC R package usage described.
      - SSD, NSC, and RSC metrics defined.
      - QC report generated as HTML.

  - id: stella_dreme_motif_analysis
    name: "DREME Motif Discovery"
    category: genomics
    tags: [stella, genomics, motif, dreme, epigenomics]
    description: >
      Discover DNA binding motifs from Nanog ChIP-seq peaks using DREME.
    prompt: >
      Discover DNA binding motifs from Nanog ChIP-seq peak sequences using DREME.
      Use the nanog_peaks_peaks.narrowPeak file as input with hg19 reference
