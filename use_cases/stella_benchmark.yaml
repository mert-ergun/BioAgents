use_cases:

  # ── PATHWAY / GENOMICS ──────────────────────────────────────────────────────

  - id: stella_kegg_complement
    name: "KEGG Complement Cascade Extraction"
    category: pathway_genomics
    tags: [stella, kegg, pathway, genomics]
    description: >
      Retrieve the KEGG pathway ID for "Complement and coagulation cascades" and
      list all genes in the complement arm (map04610).
    prompt: >
      Given the KEGG pathway "Complement and coagulation cascades", retrieve the
      pathway ID and list all genes involved in the complement arm (classical,
      lectin, and alternative activation routes) as shown in KEGG pathway map04610.
    expected_tools: []
    expected_output_contains:
      - map04610
      - C1QA
      - C3
      - CFB
    reference_output: |
      pathway_id: map04610
      complement_genes: [C1QA, C1QB, C1QC, C1R, C1S, C2, C3, C4A, C4B, C5, C6,
        C7, C8A, C8B, C8G, C9, MASP1, MASP2, MBL2, CFP, CFH, CFI, SERPING1,
        CFB, CFD, CD55, CD59]
    evaluation_criteria: |
      - pathway_id must be map04610.
      - All key genes in the classical, lectin, and alternative complement cascades are listed.
      - Gene symbols are HGNC-compliant.

  - id: stella_kegg_neuroactive
    name: "KEGG Neuroactive Ligand-Receptor Extraction"
    category: pathway_genomics
    tags: [stella, kegg, pathway, genomics]
    description: >
      Extract the full ligand-receptor gene pairs from KEGG pathway
      "Neuroactive ligand-receptor interaction" (map04080).
    prompt: >
      Given the KEGG pathway "Neuroactive ligand-receptor interaction", extract
      the full list of ligand-receptor gene pairs shown in KEGG pathway map04080.
      Include GPCRs and hormone receptor families involved in neurotransmitter
      and hormone signaling.
    expected_output_contains:
      - map04080
      - CHRM
      - DRD
      - HTR
    reference_output: |
      pathway_id: map04080
      ligand_receptor_pairs:
        - {ligand: CHRM, receptor: CHRM}
        - {ligand: ADR, receptor: ADR}
        - {ligand: DRD, receptor: DRD}
        - {ligand: HRH, receptor: HRH}
        - {ligand: HTR, receptor: HTR}
        - {ligand: AVP, receptor: AVPR}
        - {ligand: GHRL, receptor: GHSR}
        - {ligand: NPY, receptor: NPYR}
    evaluation_criteria: |
      - All receptor genes in the diagram are extracted.
      - Ligands and receptors are matched as gene symbol pairs.
      - Gene symbols must be HGNC-valid.

  - id: stella_go_mitotic_checkpoint
    name: "GO Gene Association – Mitotic Spindle Checkpoint"
    category: pathway_genomics
    tags: [stella, go, gene_ontology, genomics]
    description: >
      Identify human genes associated with GO term "mitotic spindle assembly
      checkpoint signaling" (GO:0007094) using synonyms and LLM-assisted matching.
    prompt: >
      Identify human genes associated with the GO term "mitotic spindle assembly
      checkpoint signaling" (GO:0007094). Search using synonyms such as "mitotic
      checkpoint", "SAC-independent checkpoint", "Mad2-dependent checkpoint", and
      related signaling pathway terms.
    expected_output_contains:
      - GO:0007094
      - BUB1
      - MAD2L1
      - CDC20
    reference_output: |
      GO_term: "GO:0007094 – Mitotic spindle assembly checkpoint signaling"
      expected_genes: [BUB1, BUB1B, MAD2L1, TTK, CDC20, NDC80, SPC25, KNL1]
    evaluation_criteria: |
      - GO:0007094 must be matched for at least one query synonym.
      - BUB1, BUB1B, MAD2L1, TTK, CDC20, NDC80, SPC25, and KNL1 should appear in output.
      - Normalized scores assigned to valid genes.

  - id: stella_depmap_essential_genes
    name: "Essential Genes – U2OS DepMap"
    category: pathway_genomics
    tags: [stella, depmap, crispr, rnai, genomics]
    description: >
      Analyze essential genes in U2OS (ACH-000364) using CRISPR (Chronos) and
      RNAi (DEMETER2) datasets from DepMap.
    prompt: >
      Analyze essential genes in the U2OS osteosarcoma cell line (DepMap ID:
      ACH-000364) using CRISPR (Chronos) and RNAi (DEMETER2) datasets from DepMap.
      Identify the top 10 preferentially essential genes for each method.
    expected_output_contains:
      - ACH-000364
      - SUB1
      - Chronos
      - DEMETER2
    reference_output: |
      CRISPR_top_essential: [DCAF12L1, FBXL18, SUB1, ATCAY, HS2ST1, MAP2K7,
        R3HCC1, SLC35B2, ZNF655, ZNF700]
      RNAi_top_essential: [NOM1, SUB1, GTPBP4, GAL, FIP1L1, LONP1, MPI,
        ICOSLG, OR2T11, AVIL]
    evaluation_criteria: |
      - Top 10 essential genes extracted from each screening method (CRISPR and RNAi).
      - Output clearly separates CRISPR and RNAi results.
      - Correct mapping to U2OS (ACH-000364).

  # ── DISEASE / GENE ASSOCIATION ───────────────────────────────────────────────

  - id: stella_disease_cystic_fibrosis
    name: "Disease Gene Association – Cystic Fibrosis (Text Mining)"
    category: disease_gene_association
    tags: [stella, disease, text_mining, cystic_fibrosis]
    description: >
      Identify top genes associated with Cystic Fibrosis from the DISEASES
      database using a Z-score threshold of ≥5.7.
    prompt: >
      Identify the top 10 genes associated with Cystic Fibrosis based on
      text-mining evidence from the DISEASES database (Jensen Lab). Use a Z-score
      threshold of ≥5.7 to select genes. Report the gene symbol, Z-score, and
      confidence for each.
    expected_output_contains:
      - CFTR
      - ELANE
      - CXCL8
    reference_output: |
      genes:
        - {gene: CFTR, z_score: 8.9}
        - {gene: ELANE, z_score: 6.5}
        - {gene: CXCL8, z_score: 6.2}
        - {gene: MUC5AC, z_score: 6.0}
        - {gene: MUC5B, z_score: 5.9}
        - {gene: SERPINA1, z_score: 5.9}
        - {gene: IL1B, z_score: 5.9}
        - {gene: IL6, z_score: 5.8}
        - {gene: TNF, z_score: 5.8}
        - {gene: SCNN1B, z_score: 5.7}
    evaluation_criteria: |
      - CFTR must be ranked highest (Z-score 8.9).
      - All 10 genes from the DISEASES text-mining list with Z-score ≥5.7 are present.
      - Z-score and confidence reported for each gene.

  - id: stella_disease_parkinsons
    name: "Disease Gene Association – Parkinson's Disease (Text Mining)"
    category: disease_gene_association
    tags: [stella, disease, text_mining, parkinsons]
    description: >
      Identify top genes associated with Parkinson's disease from the DISEASES
      database using a Z-score threshold of ≥7.1.
    prompt: >
      Identify the top 10 genes associated with Parkinson's disease (DOID:14330)
      based on text-mining evidence from the DISEASES database. Use a Z-score
      threshold of ≥7.1. Report gene symbol, Z-score, and confidence for each.
    expected_output_contains:
      - SNCA
      - LRRK2
      - PINK1
      - PRKN
    reference_output: |
      genes:
        - {gene: SNCA, z_score: 9.0}
        - {gene: LRRK2, z_score: 7.9}
        - {gene: TH, z_score: 7.8}
        - {gene: PRKN, z_score: 7.7}
        - {gene: SLC6A3, z_score: 7.7}
        - {gene: PINK1, z_score: 7.7}
        - {gene: PARK7, z_score: 7.6}
        - {gene: MAOB, z_score: 7.4}
        - {gene: BDNF, z_score: 7.2}
        - {gene: APP, z_score: 7.1}
    evaluation_criteria: |
      - SNCA must be ranked highest (Z-score 9.0).
      - All 10 genes with Z-score ≥7.1 are present.
      - Source must be traceable to the DISEASES database.

  - id: stella_omim_colorectal
    name: "OMIM Colorectal Cancer Gene Mapping"
    category: disease_gene_association
    tags: [stella, omim, cancer, colorectal]
    description: >
      Map genes associated with colorectal cancer susceptibility (OMIM 608812)
      including genetic linkage evidence.
    prompt: >
      Using OMIM entry 608812, describe the genes associated with colorectal
      cancer susceptibility (CRCS1). Include chromosomal locations, molecular
      evidence, and genetic linkage studies supporting susceptibility on 9q.
    expected_output_contains:
      - GALNT12
      - TGFBR1
      - 9q22
      - 608812
    reference_output: |
      associated_genes:
        - gene: GALNT12
          location: 9q22.33
        - gene: TGFBR1
          location: 9q22
      genetic_linkage:
        - chromosome: 9q22.2–q31.2
    evaluation_criteria: |
      - Describes at least two associated genes with chromosomal locations.
      - Cites molecular evidence (germline/somatic mutations, ASE).
      - Summarizes genetic linkage studies on 9q.

  # ── PROTEIN INTERACTION ──────────────────────────────────────────────────────

  - id: stella_string_phb2
    name: "STRING Protein Interaction – PHB2"
    category: protein_interaction
    tags: [stella, string, ppi, protein]
    description: >
      Identify top protein-protein interaction partners for PHB2 from STRING
      with combined score ≥0.88. Include GO and PubMed enrichment.
    prompt: >
      Using the STRING database (species: Homo sapiens, NCBI:9606), identify the
      top protein-protein interaction partners for PHB2 with a combined score
      ≥0.88. Report the top 10 partners with scores, and list relevant GO
      biological processes and PubMed references from the enrichment analysis.
    expected_output_contains:
      - PHB
      - ESR1
      - C1QBP
      - mitochondrial
    reference_output: |
      PHB2_partners:
        - {gene: PHB, score: 0.999}
        - {gene: ESR1, score: 0.985}
        - {gene: C1QBP, score: 0.964}
        - {gene: HDAC1, score: 0.946}
        - {gene: MFN1, score: 0.907}
        - {gene: OPA1, score: 0.905}
      enrichment_biological_process:
        - "GO:0008053: Mitochondrial fusion"
    evaluation_criteria: |
      - Returns top 10 PHB2 interactors with STRING score ≥0.88.
      - Interactions match STRING DB output for PHB2.
      - GO terms and PubMed enrichment included.

  - id: stella_string_ndc80
    name: "STRING Protein Interaction – NDC80"
    category: protein_interaction
    tags: [stella, string, ppi, protein]
    description: >
      Identify predicted PPI partners for NDC80 (Homo sapiens) from STRING
      with score ≥0.99.
    prompt: >
      Using the STRING database, identify the top predicted protein-protein
      interaction partners for the human gene NDC80 (NCBI:9606) with a combined
      score ≥0.99. Report the top 10 partners with their scores.
    expected_output_contains:
      - NUF2
      - SPC25
      - SPC24
      - BUB1
      - KNL1
    reference_output: |
      NDC80_partners:
        - {gene: NUF2, score: 0.999}
        - {gene: SPC25, score: 0.999}
        - {gene: SPC24, score: 0.999}
        - {gene: BUB1, score: 0.998}
        - {gene: KNL1, score: 0.995}
        - {gene: CKAP5, score: 0.994}
        - {gene: BUB1B, score: 0.992}
        - {gene: TTK, score: 0.992}
        - {gene: ZWINT, score: 0.991}
        - {gene: MIS12, score: 0.991}
    evaluation_criteria: |
      - At least 10 high-confidence partners (score ≥0.99) returned.
      - NUF2, SPC25, SPC24, BUB1, and KNL1 must be present.
      - Interactions supported by multiple evidence channels.

  # ── CANCER BIOLOGY ───────────────────────────────────────────────────────────

  - id: stella_aml_general_info
    name: "AML General Info – NCI"
    category: cancer_biology
    tags: [stella, cancer, aml, nci, literature]
    description: >
      Provide a structured NCI-based summary of adult acute myeloid leukemia
      covering definition, risk factors, symptoms, diagnosis, and prognosis.
    prompt: >
      Using the NCI patient treatment guide for adult acute myeloid leukemia
      (AML), provide a structured summary covering: blood cell types affected,
      risk factors, common symptoms, diagnostic steps, and prognosis
      considerations.
    expected_output_contains:
      - myeloid
      - bone marrow
      - chemotherapy
      - fatigue
    reference_output: |
      summary:
        definition: Cancer in which bone marrow produces abnormal blood cells.
        affected_cells: [red blood cells, white blood cells, platelets]
        risk_factors: [smoking, prior chemotherapy, radiation exposure]
        symptoms: [fever, fatigue, easy bruising or bleeding]
        diagnosis: [blood tests, bone marrow tests]
    evaluation_criteria: |
      - Includes structure of blood development from stem cells.
      - Describes affected blood cell types.
      - Lists AML symptoms, risk factors, and diagnostic methods.
      - Captures key patient-oriented insights from NCI.

  - id: stella_cancer_gene_classification
    name: "Cancer Gene Classification"
    category: cancer_biology
    tags: [stella, cancer, cosmic, pcawg, classification]
    description: >
      Classify genes as cancer-related vs. normal using COSMIC and PCAWG
      curated databases.
    prompt: >
      Using the COSMIC cancer gene census (~700 genes) and PCAWG 2020 datasets
      (87 cancer genes, 93 normal-pathway genes), classify a given gene list as
      cancer-related or normal. Report classification metrics including accuracy,
      overlap analysis between databases, and confidence scores.
    expected_output_contains:
      - COSMIC
      - PCAWG
      - cancer
      - normal
    evaluation_criteria: |
      - Can classify genes as cancer vs normal with >80% accuracy.
      - Identifies overlapping genes across COSMIC and PCAWG databases.
      - Provides confidence scores for classifications.

  # ── DRUG / COMPOUND ──────────────────────────────────────────────────────────

  - id: stella_pubchem_imatinib
    name: "PubChem Structure Info – Imatinib"
    category: drug_compound
    tags: [stella, pubchem, drug, structure]
    description: >
      Retrieve chemical structure information for Imatinib (PubChem CID 5291)
      including IUPAC name, InChI, SMILES, synonyms, and hazard classifications.
    prompt: >
      Using PubChem (CID: 5291), retrieve the chemical structure information for
      Imatinib. Report the IUPAC name, InChI, canonical SMILES, known synonyms,
      and GHS hazard classifications.
    expected_output_contains:
      - Imatinib
      - 5291
      - piperazin
      - InChI
    reference_output: |
      iupac_name: >
        4-[(4-methylpiperazin-1-yl)methyl]-N-[4-methyl-3-[(4-pyridin-3-ylpyrimidin-2-yl)amino]phenyl]benzamide
      synonyms: [Imatinib, 152459-95-5, Glamox]
      hazards: [Irritant, Health Hazard]
    evaluation_criteria: |
      - IUPAC name contains "piperazin".
      - InChI and SMILES are provided.
      - At least two synonyms listed (including Imatinib and CAS number).
      - Hazard classification includes at least one GHS category.

  # ── PROTEIN STRUCTURE ────────────────────────────────────────────────────────

  - id: stella_pdb_structure_1pc2
    name: "PDB Structure Analysis – 1PC2"
    category: protein_structure
    tags: [stella, pdb, structure, protein]
    description: >
      Analyze PDB structure 1PC2: count VAL and TRP residues (alpha carbons
      only) and calculate the CA distance between ASP72 and GLY144 in chain A.
    prompt: >
      Analyze the PDB structure 1PC2. Perform two analyses on chain A:
      (1) Count the number of VAL and TRP residues (alpha carbon atoms only).
      (2) Calculate the distance in Angstroms between the alpha carbons of
      ASP72 and GLY144.
    expected_output_contains:
      - 1PC2
      - VAL
      - TRP
      - ASP72
      - GLY144
    reference_output: |
      residue_counts:
        VAL: 12
        TRP: 1
      distance_CA_ASP72_GLY144: 47.14
    evaluation_criteria: |
      - VAL count must be 12.
      - TRP count must be 1.
      - Distance between CA of ASP72 and GLY144 must be approximately 47.14 Å (±0.1).

  - id: stella_pdb_chain_3bdp
    name: "PDB Chain Analysis – 3BDP"
    category: protein_structure
    tags: [stella, pdb, structure, dna, protein]
    description: >
      Identify and describe all unique chains in PDB structure 3BDP
      (protein, DNA).
    prompt: >
      Analyze the PDB structure 3BDP and identify all unique chains. For each
      chain, describe its type (protein, DNA, RNA, etc.) and composition.
    expected_output_contains:
      - 3BDP
      - chain A
      - chain P
      - chain T
    reference_output: |
      chains: [A, P, T]
      chain_count: 3
    evaluation_criteria: |
      - All three chains (A, P, T) must be identified.
      - Chain types correctly described (protein and DNA).

  - id: stella_pdb_protein_dna_interaction
    name: "Protein-DNA Interaction Analysis – 3BDP"
    category: protein_structure
    tags: [stella, pdb, structure, interaction, dna]
    description: >
      Analyze protein-DNA contacts in PDB 3BDP between protein chain A and
      DNA chain P using a 4.0 Å distance cutoff.
    prompt: >
      Analyze the protein-DNA interactions in PDB structure 3BDP. Identify
      residues in protein chain A and nucleotides in DNA chain P that are
      within 4.0 Å of each other. List all interacting residue pairs.
    expected_output_contains:
      - 3BDP
      - LYS
      - ARG
      - chain A
      - chain P
    reference_output: |
      interacting_residues:
        chain_A: [LYS431, PRO531, THR550, LYS551, SER555, THR556, SER557,
          ALA558, ARG578, GLN579, LYS582, TYR587, GLN624, ASN625, ILE626,
          PRO627, ILE628, ARG629]
        chain_P: [DC8, DT10, DG11, DA12, DT13, DG14, DC15]
    evaluation_criteria: |
      - Interacting residues from chain A are listed with residue numbers.
      - DNA nucleotides from chain P are listed.
      - Distance cutoff of 4.0 Å is applied.

  - id: stella_pdb_secondary_structure
    name: "Secondary Structure Analysis – 3BDP Chain A"
    category: protein_structure
    tags: [stella, pdb, secondary_structure, protein]
    description: >
      Analyze the secondary structure composition (helix, sheet, coil) of
      chain A in PDB structure 3BDP.
    prompt: >
      Analyze the secondary structure composition of chain A in PDB structure
      3BDP. Report the number of residues in helix, sheet, and coil
      conformations.
    expected_output_contains:
      - 3BDP
      - helix
      - sheet
    reference_output: |
      secondary_structure:
        helix_residues: 668
        sheet_residues: 128
        coil_residues: 0
    evaluation_criteria: |
      - Helix residue count approximately 668.
      - Sheet residue count approximately 128.
      - Coil residues reported (reference value: 0).

  - id: stella_pdb_ligand_3bdp
    name: "Ligand Analysis – 3BDP"
    category: protein_structure
    tags: [stella, pdb, ligand, structure]
    description: >
      Identify all non-water ligands in PDB structure 3BDP including sulfate
      ions and modified nucleotides.
    prompt: >
      Identify and analyze all non-water ligands in PDB structure 3BDP. For
      each ligand, report the residue name, residue number, and chain.
    expected_output_contains:
      - 3BDP
      - SO4
      - chain A
      - chain P
    reference_output: |
      ligands:
        - {resn: SO4, resi: 910, chain: A}
        - {resn: SO4, resi: 912, chain: A}
        - {resn: SO4, resi: 915, chain: A}
        - {resn: SO4, resi: 920, chain: A}
        - {resn: 2DT, resi: 16, chain: P}
    evaluation_criteria: |
      - All 4 sulfate (SO4) ligands in chain A are identified.
      - The 2DT modified nucleotide in chain P is identified.
      - Non-water ligand identification is complete.

  # ── MOLECULAR CLONING ────────────────────────────────────────────────────────

  - id: stella_pcr_primer_tm60_eyfp
    name: "PCR Primer Design – Tm 60°C (eYFP CDS)"
    category: molecular_cloning
    tags: [stella, pcr, primer_design, cloning]
    description: >
      Design forward and reverse primers flanking an eYFP CDS-like region
      targeting an annealing temperature of 60°C.
    prompt: >
      Design forward and reverse PCR primers for the following DNA sequence,
      targeting an annealing temperature of approximately 60°C. Report primer
      sequences, lengths, Tm values, GC content, and expected product size.

      Sequence:
      
    expected_output_contains:
      - ATGGTGTCCAAGGGCGAAG
      - CTTGTACAGCTCGTCCATGCC
    reference_output: |
      primer_forward: {sequence: ATGGTGTCCAAGGGCGAAG, length: 19, Tm_C: 59.7, GC_percent: 52.6}
      primer_reverse: {sequence: CTTGTACAGCTCGTCCATGCC, length: 21, Tm_C: 60.4, GC_percent: 52.4}
      expected_product_size_bp: 702
    evaluation_criteria: |
      - Forward primer must be ATGGTGTCCAAGGGCGAAG.
      - Reverse primer must be CTTGTACAGCTCGTCCATGCC.
      - Expected product size is 702 bp.
      - Tm values within ±1°C of 60°C.

  - id: stella_pcr_primer_tm60_kanamycin
    name: "PCR Primer Design – Tm 60°C (Kanamycin resistance)"
    category: molecular_cloning
    tags: [stella, pcr, primer_design, cloning]
    description: >
      Design primers for a kanamycin resistance CDS targeting 60°C annealing
      temperature.
    prompt: >
      Design forward and reverse PCR primers for the following DNA sequence
      (kanamycin resistance gene), targeting an annealing temperature of ~60°C.

      Sequence:
      
    expected_output_contains:
      - atgagccatattcaacgggaaacg
      - ttagaaaaactcatcgagcatcaaatgaaact
    reference_output: |
      primer_forward: {sequence: atgagccatattcaacgggaaacg, length: 24}
      primer_reverse: {sequence: ttagaaaaactcatcgagcatcaaatgaaact, length: 32}
    evaluation_criteria: |
      - Forward primer starts at the 5' ATG of the sequence.
      - Reverse primer is the reverse complement of the 3' end.
      - Tm values within ±1°C of 60°C.
      - GC content between 40–60%.

  - id: stella_pcr_primer_tm60_ampicillin
    name: "PCR Primer Design – Tm 60°C (Ampicillin resistance)"
    category: molecular_cloning
    tags: [stella, pcr, primer_design, cloning]
    description: >
      Design primers for an ampicillin resistance gene targeting 60°C annealing
      temperature.
    prompt: >
      Design forward and reverse PCR primers for the following DNA sequence
      (ampicillin resistance / beta-lactamase gene), targeting an annealing
      temperature of ~60°C.

      Sequence:
      
    expected_output_contains:
      - atgagtattcaacatttccgtgtcgc
      - ttaccaatgcttaatcagtgaggcac
    reference_output: |
      primer_forward: {sequence: atgagtattcaacatttccgtgtcgc, length: 26, Tm_C: ~60}
      primer_reverse: {sequence: ttaccaatgcttaatcagtgaggcac, length: 26, Tm_C: ~60}
    evaluation_criteria: |
      - Forward primer starts at sequence start (5' ATG).
      - Reverse primer is the reverse complement of the sequence end.
      - Tm values within ±1°C of 60°C.
      - GC content between 40–60%.

  - id: stella_pcr_primer_tm55_ampicillin
    name: "PCR Primer Design – Tm 55°C (Ampicillin resistance)"
    category: molecular_cloning
    tags: [stella, pcr, primer_design, cloning]
    description: >
      Design primers for an ampicillin resistance gene targeting 55°C annealing
      temperature.
    prompt: >
      Design forward and reverse PCR primers for the following DNA sequence
      targeting an annealing temperature of ~55°C. The same ampicillin
      resistance gene sequence is used but primers should be shorter to achieve
      the lower Tm.

      Sequence:
      
    expected_output_contains:
      - atgagtattcaacatttccgtgt
      - ttaccaatgcttaatcagtgagg
    reference_output: |
      primer_forward: {sequence: atgagtattcaacatttccgtgt, length: 23, Tm_C: ~55}
      primer_reverse: {sequence: ttaccaatgcttaatcagtgagg, length: 23, Tm_C: ~55}
    evaluation_criteria: |
      - Primers are shorter than the 60°C variant to achieve lower Tm.
      - Tm values within ±1°C of 55°C.
      - GC content between 30–60%.

  - id: stella_pcr_primer_tm60_at_rich
    name: "PCR Primer Design – Tm 60°C (AT-rich region)"
    category: molecular_cloning
    tags: [stella, pcr, primer_design, cloning]
    description: >
      Design primers for an AT-rich DNA region targeting 60°C annealing
      temperature.
    prompt: >
      Design forward and reverse PCR primers for the following AT-rich DNA
      sequence, targeting an annealing temperature of approximately 60°C:

      ctagttagaaaaagacatttttgctgtcagtcactgtcaagagattcttttgctggcatttcttctagaagcaaaaagagcgatgcgtcttttccgctgaaccgttccagcaaaaaagactaccaacgcaatatggattgtcagaatcatataaaagagaagcaaataactccttgtcttgtatcaattgcattataatatcttcttgttagtgcaatatcatatagaagtcatc
    expected_output_contains:
      - CTAGTTAGAAAAAGACATTTTTGC
      - GATGACTTCTATATGATATTGCAC
    reference_output: |
      primer_forward: {sequence: CTAGTTAGAAAAAGACATTTTTGC, length: 24, Tm_C: 59.8, GC_percent: 33.3}
