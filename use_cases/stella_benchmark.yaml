      the NEB Gibson Assembly Kit at 50°C for 15 min.
    prompt: >
      Plan a Gibson Assembly reaction to clone a 1.5 kb gene insert into a 5 kb
      plasmid vector (vector mass: 50 ng) using the NEB Gibson Assembly Kit.
      Use a 3:1 molar excess of insert over vector, total reaction volume 20 µl,
      at 50°C for 15 min. Provide the complete reaction setup.
    expected_output_contains:
      - Gibson
      - 50°C
      - 15 min
      - 20 µl
    reference_output: |
      reaction_setup:
        gibson_master_mix_2x_ul: 10
        vector_mass_ng: 50
        insert_calculated_mass_ng: ~15
        water_ul: to_volume_20ul
      incubation: {temp_celsius: 50, time_minutes: 15}
      transformation: {competent_cells: "NEB 5-alpha E. coli", volume_ul: 2}
    evaluation_criteria: |
      - Gibson master mix is 10 µl (half of total volume).
      - Total reaction volume is 20 µl.
      - Insert molar excess ~3x relative to vector mass.
      - Incubation conditions: 50°C, 15 min.

  - id: stella_golden_gate_assembly
    name: "Golden Gate Assembly – Multi-Insert"
    category: molecular_cloning
    tags: [stella, golden_gate, cloning, wet_lab]
    description: >
      Setup a Golden Gate Assembly (BsaI-HFv2, NEB E1601) to assemble 4 inserts
      into pGGAselect at 2:1 molar ratio, 30 cycles.
    prompt: >
      Design a Golden Gate Assembly reaction using the NEB E1601 kit (BsaI-HFv2)
      to assemble 4 DNA inserts (500, 700, 900, 300 bp) into the pGGAselect
      vector (2133 bp, 75 ng/µl). Use a 2:1 insert-to-vector molar ratio, total
      volume 20 µl, with the NEB thermocycling protocol (30 cycles alternating
      37°C/16°C). Provide the complete reaction setup.
    expected_output_contains:
      - BsaI
      - pGGAselect
      - 37°C
      - 16°C
      - 30 cycles
    reference_output: |
      enzyme: BsaI-HFv2
      reaction_setup:
        vector_volume_ul: 1.0
        ligase_buffer_10x_ul: 2.0
        golden_gate_mix_ul: 1.0
      thermocycling:
        cycles: 30
        step1: {temp: 37, time: 1min}
        step2: {temp: 16, time: 1min}
        final: {temp: 60, time: 5min}
    evaluation_criteria: |
      - BsaI-HFv2 specified as restriction enzyme.
      - 30 cycles with alternating 37°C/16°C (1 min each).
      - Total reaction volume is 20 µl.
      - Insert-vector ratio 2:1 molar.

