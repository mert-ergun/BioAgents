  - id: stella_pcr_q5_hifi
    name: "PCR Protocol – Q5 High-Fidelity Polymerase"
    category: molecular_cloning
    tags: [stella, pcr, wet_lab, neb]
    description: >
      Design a PCR experiment using Q5 High-Fidelity DNA Polymerase to amplify
      a 1.5 kb target from a plasmid at 60°C annealing.
    prompt: >
      Design and simulate a complete PCR protocol using Q5 High-Fidelity DNA
      Polymerase (NEB) to amplify a 1.5 kb target from a plasmid template with
      a primer Tm of 60°C. Provide the full reaction setup (volumes, components)
      and thermocycling conditions following the official NEB Q5 protocol.
    expected_output_contains:
      - Q5
      - 98°C
      - 72°C
      - 30 cycles
    reference_output: |
      reaction_setup:
        buffer: "5X Q5 Reaction Buffer"
        dntps: "10 mM dNTPs"
        primer_concentration_uM: 0.5
        polymerase_volume_ul: 0.5
      thermocycling:
        initial_denaturation: {temp: 98, time: 30s}
        cycles: 30
        denaturation: {temp: 98, time: 10s}
        annealing: {temp: 60, time: 20s}
        extension: {temp: 72, time: "30s/kb"}
        final_extension: {temp: 72, time: 2min}
    evaluation_criteria: |
      - Initial denaturation at 98°C for 30 s.
      - 30 amplification cycles specified.
      - Annealing at 60°C for 20 s.
      - Extension at 72°C at 30 s/kb rate, ~45 s for 1.5 kb.
      - Final extension at 72°C for 2 min.

  - id: stella_gibson_assembly
    name: "Gibson Assembly – Two Fragments"
    category: molecular_cloning
    tags: [stella, gibson_assembly, cloning, wet_lab]
    description: >
