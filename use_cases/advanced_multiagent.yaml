  - id: adv_clinical_variant_curation
    name: "ACMG/AMP Variant Classification: BRCA1/BRCA2 VUS Panel"
    category: clinical_genomics
    tags: [advanced, clinical, variant, ACMG, BRCA, VUS]
    description: >
      ACMG/AMP 2015 curation of five BRCA1/BRCA2 variants of uncertain
      significance, applying PVS1/PS4/PM2/PP3/BA1 criteria with gnomAD and
      functional evidence, proposing experimental follow-up for remaining VUS.
    prompt: >
      I'm a clinical geneticist and I need to classify five BRCA1/BRCA2 variants
      that are currently reported as uncertain significance in our patients with
      hereditary breast and ovarian cancer syndrome. Can you work through each
      one using the ACMG/AMP 2015 criteria and give me a classification with the
      specific evidence codes that support it?

      The variants are:
        BRCA1 c.5266dupC (p.Gln1756ProfsTer74) in NM_007294.4
        BRCA2 c.6272_6275del (p.Asn2091IlefsTer12) in NM_000059.4
        BRCA1 c.5030_5033del (p.Val1677CysfsTer3) in NM_007294.4
        BRCA2 c.1813A>T (p.Lys605X) in NM_000059.4
        BRCA1 c.3331_3334del (p.Gln1111ArgfsTer4) in NM_007294.4

      For each variant, I need the mutation type, predicted protein consequence,
      the ACMG criteria codes that apply and why, and the final classification.
      If any variant remains a VUS after your assessment, tell me exactly what
      type of additional evidence — functional assays, segregation studies, RNA
      splicing data — would be most likely to resolve the classification. Give me
      a table I can bring to our variant curation committee.
    expected_agents: [research, analysis, critic, report]
    expected_output_contains:
      - BRCA1
      - BRCA2
      - ACMG
      - PVS1
      - PM2
      - Pathogenic
      - gnomAD
      - frameshift
    evaluation_criteria: |
      - All 5 variants analysed individually with mutation type identified.
      - PVS1 correctly applied to frameshift/nonsense variants.
      - PM2 criterion addresses gnomAD population frequency.
      - Final classification assigned for each variant.
      - Clinical significance statement includes HBOC context.
      - VUS variants have specific proposed experimental follow-up.
      - ACMG criteria matrix table produced for committee use.
      - Rule application verified and inconsistencies flagged.

  - id: adv_clinical_pgx_panel
    name: "Pharmacogenomics Panel Report: 12-Gene Pre-emptive Interpretation"
    category: clinical_genomics
    tags: [advanced, clinical, pharmacogenomics, PGx, CPIC]
    description: >
      Interpret a 12-gene pre-emptive pharmacogenomics panel using CPIC
      guidelines, mapping star-allele diplotypes to phenotypes and drug
      interactions with dosing recommendations, priority alerts, and a
      patient-facing summary.
    prompt: >
      I need a clinical pharmacogenomics report for a patient who just had our
      pre-emptive 12-gene panel completed. Here are the diplotype results:
      CYP2D6 *4/*10, CYP2C19 *1/*17, CYP2C9 *1/*3, CYP3A5 *3/*3,
      CYP2B6 *1/*6, SLCO1B1 *1a/*5, DPYD *1/*1, TPMT *1/*3A, NUDT15 *1/*1,
      G6PD B/B, HLA-B *15:02 not detected, UGT1A1 *1/*28.

      For each gene, tell me the predicted metaboliser or activity phenotype,
      and list the most clinically important drug interactions with specific
      CPIC-guided recommendations — whether to use an alternative drug, adjust
      the dose, or proceed normally. I need a high-priority alert table that
      calls out the most actionable drug-gene pairs. Please also flag the HLA-B
      result for carbamazepine safety and the UGT1A1 result for irinotecan, and
      explain the concept of phenoconversion if this patient is also taking a
      strong CYP2D6 inhibitor. Finally, write a plain-language summary paragraph
      that I can include in the patient's chart, and note where the CPIC evidence
      is strong versus where there's more uncertainty.
    expected_agents: [research, analysis, critic, report]
    expected_output_contains:
      - CYP2D6
      - CYP2C19
      - CPIC
      - Intermediate Metaboliser
      - SLCO1B1
      - irinotecan
      - UGT1A1
      - HLA-B
      - carbamazepine
      - phenoconversion
    evaluation_criteria: |
      - All 12 genes assigned correct phenotype from diplotype.
      - ≥3 drug interactions listed per gene with CPIC guidance.
      - High-priority alert table produced with actionable recommendations.
      - Phenoconversion concept applied for CYP2D6 in context of inhibitor use.
      - HLA-B*15:02 carbamazepine safety correctly addressed.
      - UGT1A1 *1/*28 irinotecan dose adjustment flagged.
      - Plain-language patient summary included.
      - Strong (A) vs. uncertain (B/C) CPIC evidence distinguished.

