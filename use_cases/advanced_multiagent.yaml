  - id: adv_sysbio_ppi_network_cancer
    name: "Cancer Dependency PPI Network: Hub, Bottleneck, and SL Discovery"
    category: systems_biology
    tags: [advanced, systems_biology, PPI, network, synthetic_lethal, coder]
    description: >
      Build and analyse a PPI network for 20 cancer driver genes using graph
      theory metrics, Louvain community detection, synthetic lethality
      prediction, and druggable subgraph analysis.
    prompt: >
      I want to understand the protein interaction network topology around the
      major cancer driver genes and use it to find both therapeutic hub targets
      and potential synthetic lethal pairs. The gene set I'm interested in is:
      EGFR, MYC, TP53, KRAS, PIK3CA, PTEN, RB1, CDKN2A, APC, VHL, BRCA1,
      BRCA2, ATM, MTOR, BRAF, NRAS, NFE2L2, SMAD4, ARID1A, EP300. Please build
      their interaction network including first-shell interaction partners,
      compute proper network centrality measures to identify both the most
      connected hubs and the proteins that act as critical bridges between
      different parts of the network, and cluster the network into functional
      modules. From those modules, find pairs of genes in different modules that
      share common neighbours — those are my candidate synthetic lethal pairs.
      Tell me which of the top hub and bottleneck proteins are currently druggable,
      and give me an honest assessment of whether the network structure you've
      built is biologically reasonable — are there any critical known interactions
      that are missing?
    expected_agents: [coder, analysis, critic, report]
    expected_tools:
      - execute_ml_code
    expected_output_contains:
      - NetworkX
      - betweenness centrality
      - degree centrality
      - Louvain
      - synthetic lethal
      - hub
      - MYC
      - EGFR
    evaluation_criteria: |
      - PPI network with ≥50 nodes constructed with STRING-like scores.
      - Degree and betweenness centrality computed for all nodes.
      - Top 5 hubs and top 5 bottlenecks identified.
      - Louvain community detection applied; ≥3 named functional modules.
      - ≥5 synthetic lethal candidate pairs reported.
      - Druggable subgraph identified and characterised.
      - Biological plausibility of network assessed; missing edges flagged.

  - id: adv_sysbio_boolean_pi3k_model
    name: "Boolean Network Simulation: PI3K-AKT-mTOR Signalling and Drug Perturbation"
    category: systems_biology
    tags: [advanced, systems_biology, boolean_model, signalling, PI3K, mTOR]
    description: >
      Build and simulate a Boolean network of the PI3K-AKT-mTOR-S6K axis,
      comparing WT vs. PTEN-null states, single and combined drug perturbations,
      and sensitivity analysis identifying which nodes most effectively suppress
      proliferation.
    prompt: >
      I want to model how PI3K-AKT-mTOR signalling drives proliferation in
      a PTEN-null tumour context and predict which drug combinations would be
      most effective. Can you build a Boolean network model of this pathway —
      including growth factor input, EGFR, RAS, the RAF-MEK-ERK branch, the
      PI3K-PIP3-AKT branch, TSC complex, RHEB, mTORC1, S6K, and a proliferation
      output node — and simulate it under four conditions: normal growth factor
      signalling, PTEN loss alone, PTEN loss with rapamycin treatment, and PI3K
      inhibition? I want to see which nodes are active at steady state in each
      condition, how many nodes change state when you knock out PTEN, and whether
      rapamycin alone is sufficient to block proliferation in a PTEN-null tumour.
      Then find out what would happen if you combined MEK inhibition with
      mTORC1 inhibition in the PTEN-null context. Finally, tell me which nodes,
      if forced off, would most reliably shut down proliferation — those are
      my candidate combination targets. Please be clear about what this kind of
      model can and can't tell me compared to real kinetic data.
    expected_agents: [coder, analysis, critic, report]
    expected_tools:
      - execute_ml_code
    expected_output_contains:
      - Boolean
      - PI3K
      - AKT
      - mTORC1
      - PTEN
      - rapamycin
      - attractor
      - proliferation
    evaluation_criteria: |
      - Boolean rules correctly implemented for all pathway nodes.
      - 4 conditions simulated with synchronous update.
      - Proliferation output correctly differs between WT and PTEN-null.
      - Rapamycin partial suppression in PTEN-null correctly modelled.
      - MEK + rapamycin combination result reported.
      - Sensitivity analysis identifies ≥2 candidate combination targets.
      - Model limitations vs. kinetic ODE modelling discussed.

