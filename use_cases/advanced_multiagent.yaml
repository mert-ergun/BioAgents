  - id: adv_e2e_target_discovery_alzheimers
    name: "End-to-End Therapeutic Target Discovery: Alzheimer's Disease"
    category: end_to_end_discovery
    tags: [advanced, end_to_end, alzheimers, target_discovery]
    description: >
      Complete autonomous target discovery for Alzheimer's disease spanning
      GWAS evidence, transcriptomics, CSF proteomics, PPI network analysis,
      structural druggability assessment, and a fully scored ranked target report
      engaging all major agent types.
    prompt: >
      I'm leading a target identification program for Alzheimer's disease and
      I need a comprehensive evidence-based target prioritisation. Please pull
      together the genetic evidence from GWAS — give me the top loci from the
      NHGRI-EBI Catalog with their mapped genes and p-values — and combine that
      with what transcriptomics studies have found consistently dysregulated in
      AD brain tissue and what proteomics has found changed in CSF. Then build
      an interaction network around this combined gene set and use it to
      identify which targets are network hubs that might have disproportionate
      influence. For the top candidates coming out of the network, check what
      structural data exists and whether the proteins have known ligandable
      pockets. I want each candidate scored on multiple evidence pillars:
      genetic, transcriptomic, proteomic, network position, structural
      druggability, and human genetic validation. The final output should be a
      ranked table of your top ten targets with scores across all pillars, and
      a written recommendation for the three you think are most worth pursuing,
      with a mechanistic hypothesis for each explaining how targeting it could
      modify disease. Please also give me your assessment of CNS drug delivery
      challenges for each of those three.
    expected_agents: [research, coder, analysis, critic, report]
    expected_tools:
      - fetch_pdb_structure
      - get_pdb_polymer_entities
      - analyze_interface_contacts
      - execute_ml_code
      - tool_universe_find_tools
      - tool_universe_call_tool
    expected_output_contains:
      - Alzheimer
      - GWAS
      - APOE
      - BIN1
      - druggability
      - network
      - CSF
      - blood-brain barrier
    evaluation_criteria: |
      - ≥15 GWAS loci listed with SNP, gene, and p-value.
      - ≥10 transcriptomic genes with study support.
      - ≥5 CSF proteomic proteins identified.
      - PPI network built; degree/betweenness centrality computed.
      - Top 5 network hubs identified as candidate targets.
      - PDB availability and pocket druggability assessed for top targets.
      - Multi-pillar scoring (genetic/transcriptomic/proteomic/network/structural) applied.
      - Ranked table of top 10 targets produced.
      - Top 3 targets recommended with mechanistic hypothesis each.
      - CNS penetrance and BBB challenges assessed per recommendation.

  - id: adv_e2e_neoantigen_vaccine
    name: "Personalised Neoantigen Cancer Vaccine Design: Melanoma"
    category: end_to_end_discovery
    tags: [advanced, end_to_end, neoantigen, vaccine, immunology, melanoma]
    description: >
      Autonomous personalised neoantigen vaccine design: mutation calling,
      MHC-I binding prediction, immunogenicity scoring, structural epitope
      analysis, and RNA-LNP formulation recommendation for a simulated
      melanoma patient.
    prompt: >
      I have whole-exome sequencing data from a melanoma patient and I want to
      design a personalised neoantigen vaccine. The patient's tumour has somatic
      missense mutations in these melanoma driver genes: BRAF, NRAS, NF1, CDKN2A,
      TP53, PTEN, RAC1, PREX2, MAP2K1, and ARID2, with various amino acid
      substitutions and variant allele fractions ranging from 10% to 90%.
      The patient's HLA type is HLA-A*02:01, HLA-A*24:02, HLA-B*07:02,
      HLA-B*15:01, HLA-C*06:02, and HLA-C*07:02. From these mutations, identify
      which ones generate neopeptides that are predicted to bind well to the
      patient's HLA alleles, then narrow down the candidates based on
      immunogenicity factors — I want peptides that are from clonally dominant
      mutations, that create a change likely to be recognised by T cells, and
      that don't resemble self. Give me your final top 10 vaccine peptides with
      binding predictions and immunogenicity scores. For the top candidates,
      tell me what structural features of the HLA-peptide complex support good
      TCR engagement. Then give me a concrete vaccine formulation recommendation
      — delivery vehicle, adjuvant system, dosing rationale — and be honest
      about where the predictions are most uncertain compared to real
      experimental binding assays.
    expected_agents: [coder, analysis, research, critic, report]
    expected_tools:
      - execute_ml_code
      - search_pdb_complexes
      - fetch_pdb_structure
      - analyze_interface_contacts
    expected_output_contains:
      - neoantigen
      - HLA-A*02:01
      - MHC-I
      - IC50
      - immunogenicity
      - RNA-LNP
      - TCR
      - VAF
    evaluation_criteria: |
      - Neopeptides generated from somatic mutations covering driver genes.
      - MHC-I binding prediction applied across all patient HLA alleles.
      - Top 20 binders ranked by predicted IC50.
      - Immunogenicity scoring applied (clonality, TCR contact, self-similarity).
      - Top 10 final vaccine candidates selected with combined scores.
      - HLA-peptide structural context from PDB discussed.
      - TCR contact residues identified.
      - RNA-LNP delivery and adjuvant rationale included.
      - Prediction uncertainty vs. experimental assays (netMHCpan) addressed.
