version: "3.9"

services:
  bioagents-api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - sandbox-data:/app/sandbox_workdir
      - ./generated_artifacts:/app/generated_artifacts
      - ./uploads:/app/uploads
      - ./experiment_runs:/app/experiment_runs
    restart: unless-stopped

  bioagents-sandbox:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["sleep", "infinity"]
    env_file:
      - .env
    volumes:
      - sandbox-data:/app/sandbox_workdir
    restart: unless-stopped

volumes:
  sandbox-data:
